# Финальный набор репозиториев и пар коммитов для основного куба
# эксперимента. См. план.md §6 для критериев отбора.
#
# Каждая запись соответствует одному merged PR, который меняет 1–4 файла
# в продовом коде Go (без _test.go и автогенерации). base — это
# состояние main непосредственно перед мержем (parent merge-коммита),
# head — сам merge-коммит. Все примеры собираются (`go build ./...`) и
# проходят `go test -short ./<pkg>/...` под Linux/Go 1.24+.
#
# Прогон выполняется в WSL2 / Linux: некоторые проекты содержат тесты
# в смежных пакетах, которые требуют Linux-окружения (file permissions,
# build-tags). Агент вычисляет coverage по затронутому пакету, а не по
# всему модулю, поэтому такие тесты в наш прогон не попадают.

workdir: workdir

repos:
  # --- Слот 1: HTTP-роутер (малый) -----------------------------------
  - name: gorilla-mux
    url: https://github.com/gorilla/mux.git
    base: de7178dc9dffadc3cf56bece3962737e8b0710b8
    head: 525206d7c2b250ca658700448b3bf23ec4707115
    # PR #759: Feature route middleware with `.Use`
    # https://github.com/gorilla/mux/pull/759
    # Файлы: middleware.go (новый, +16), route.go (+18/-1).
    # PR влит rebase'ом, поэтому base = parent первого PR-коммита
    # 7cc5738 ("Added middleware support for individual routes"),
    # head = последний коммит PR на main.

  # --- Слот 2: Утилита (малый) ---------------------------------------
  - name: google-uuid
    url: https://github.com/google/uuid.git
    base: c58770eb495f55fe2ced6284f93c5158a62e53e3
    head: a2b2b32373ff0b1a312b7fdf6d38a977099698a6
    # PR #150: fix: Monotonicity in UUIDv7
    # https://github.com/google/uuid/pull/150
    # Файлы: version7.go.

  # --- Слот 3: CLI framework (средний) -------------------------------
  - name: spf13-cobra
    url: https://github.com/spf13/cobra.git
    base: f2878bab8c96afd6e36968af96343b35dbb82a82
    head: 746ef07158728502482cea9f880a6f4b21ef29a9
    # PR #2356: prevent completions from mutating os.Args via append side effect
    # https://github.com/spf13/cobra/pull/2356
    # Файлы: completions.go.

  # --- Слот 4: Парсер / кодек (средний) ------------------------------
  - name: burntsushi-toml
    url: https://github.com/BurntSushi/toml.git
    base: d73da82a4a6b82eb63738e26e2d7f883fa4fd91b
    head: 7edfd735b3b7892e5f93b3b6b6d1a809e02c0b9e
    # PR #379: Allow Unicode in keys (uni-keys)
    # https://github.com/BurntSushi/toml/pull/379
    # Файлы: lex.go (+16, добавляет проверку Unicode в ключах).
    # Заметка: PR #418 ранее использовался, но его diff состоял
    # только из удалений (-3 в meta.go), агент корректно отфильтровывал
    # такой PR (нечего тестировать), и результат давал files=0 на всех
    # 18 ablation × 3 run = 54 запусках. PR #379 — первый PR с реальным
    # production-добавлением, найденный в истории main.

  # --- Слот 5: Web framework (средний) -------------------------------
  - name: gin-gonic-gin
    url: https://github.com/gin-gonic/gin.git
    base: fb2583442c4d9bccb75e6d26f1aa6e7c01950db6
    head: 472d086af2acd924cb4b9d7be0525f7d790f69bc
    # PR #4535: fix(tree): panic in findCaseInsensitivePathRec with RedirectFixedPath
    # https://github.com/gin-gonic/gin/pull/4535
    # Файлы: tree.go (корень модуля → coverage гонится по `./...`).

  # --- Слот 6: Embedded storage (средне-крупный) ---------------------
  - name: etcd-io-bbolt
    url: https://github.com/etcd-io/bbolt.git
    base: 5a7468c8a9ea508b9a546f22286726619819ad0c
    head: 36efe3ee12b5ef4d2ba79a3756d4713efdc4b7ee
    # PR #1179: freelist/hashmap: batch contiguous IDs when merging free spans
    # https://github.com/etcd-io/bbolt/pull/1179
    # Файлы: internal/freelist/hashmap.go.
    # Замечание: пакет tests/failpoint падает без build-tag, но coverage
    # гонится в ./internal/freelist/... и его не активирует.

  # --- Слот 7: Distributed / consensus (крупный) ---------------------
  - name: hashicorp-raft
    url: https://github.com/hashicorp/raft.git
    base: 5157c19cc233325dd92226aa0fdfe7f1dc188f2d
    head: 91745625f50efb7098f6a87a6c485cf54c435c1b
    # PR #494: heartbeat-backoff (cappedExponentialBackoff)
    # https://github.com/hashicorp/raft/pull/494
    # Файлы: replication.go (+5/-2), util.go (+17, новая функция
    # cappedExponentialBackoff). Тесты идут ~130с на M1/Ryzen, дефолтный
    # go test timeout укладывается.
    # Заметка: PR #609 ранее использовался, но его production-часть была
    # одной строкой удаления (raft.go -1), и агент отфильтровывал PR как
    # "нечего тестировать" → files=0 на всех 54 запусках. PR #494 содержит
    # новую публичную функцию cappedExponentialBackoff и изменение тела
    # heartbeat — оба клиерн-кейса для генерации тестов.

  # --- Слот 8: Прикладное приложение (крупный) -----------------------
  - name: restic-restic
    url: https://github.com/restic/restic.git
    base: f78e3f369da66ad5589370d2a719ee1b190ad7f5
    head: 880b08f9ec03425028634129fb8016c0860dca4b
    # PR #5627: restore: tune fileswriter
    # https://github.com/restic/restic/pull/5627
    # Файлы: internal/restorer/filerestorer.go (+2),
    #        internal/restorer/fileswriter.go (+50/-5).
    # head — merge-коммит, base — его parent #1 (main до мерджа).
    # Coverage гонится по ./internal/restorer/... — пакет проходит
    # `go test -short` за <1 c, без зависимостей от cmd/restic
    # с его TestStdinFromCommand-проблемой.
    # Заметка: предыдущий выбор PR #5614 был отклонён, его продовая
    # часть схлопнулась при мердже из-за параллельного слияния
    # эквивалентных правок, остался только тест-файл.
