# Финальный набор репозиториев и пар коммитов для основного куба
# эксперимента. Заполняется после клонирования кандидатов из
# `кандидаты-репо.md` и просмотра свежих merged PR на каждом из них.
#
# Схема: см. internal/benchmark/dataset.go в репозитории testgen-agent.
#
# workdir/ относится к корню этого репозитория и игнорируется git'ом
# (см. .gitignore). Сюда benchmark-runner кладёт shallow-клоны
# тестируемых проектов и сохраняет их между прогонами как кэш.

workdir: workdir

repos:
  # TODO: после анализа PR заполняется реальными SHA. Шаблон записи:
  # - name: gorilla-mux
  #   url: https://github.com/gorilla/mux.git
  #   base: <SHA-непосредственно-перед-PR>
  #   head: <SHA-merge-коммита-PR-или-PR-head>
  #   # subdir: подкаталог с go.mod, если он не в корне (необязательно)
  #   # exclude: список регулярных выражений для игнорирования файлов
